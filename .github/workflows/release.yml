name: Release

on:
  # Fires when a version tag is pushed (e.g. git push origin v1.0.0)
  push:
    tags:
      - 'v*.*.*'
  # Run on demand from the GitHub Actions UI — click Actions → Release → Run workflow
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: use the version the user typed in
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Tag push: derive version from the tag name
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if release already exists
        id: check_release
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Release ${VERSION} already exists – nothing to do."
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "Release ${VERSION} does not exist yet – will create it."
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -qx ".*refs/tags/$VERSION"; then
            echo "Tag $VERSION already exists on remote – skipping tag creation."
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "Tag $VERSION created and pushed."
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_NUM="${VERSION#v}"
          # Extract the section that belongs to this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION_NUM}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Build a rich, well-formatted release body
          {
            echo "## 🤖 Line Following Robot ${VERSION}"
            echo ""
            echo "> An autonomous Arduino-based robot that follows a black line on a white surface"
            echo "> using IR sensors and visual feedback via a 16×2 LCD display and LEDs."
            echo ""
            echo "---"
            echo ""
            echo "${NOTES}"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Quick Start"
            echo ""
            echo '```bash'
            echo "git clone https://github.com/${{ github.repository }}.git"
            echo "cd A_line_following_robot"
            echo '```'
            echo ""
            echo "Open \`src/line_following_robot.ino\` in the Arduino IDE, select your board"
            echo "(**Arduino Mega** or **Uno**), install the **LiquidCrystal I2C** library, and upload."
            echo ""
            echo "Full setup instructions are in [README.md](README.md)."
          } > release_notes.md
          echo "Release notes written for version ${VERSION_NUM}."

      - name: Package source code archives
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          REPO_NAME="A_line_following_robot"
          git archive --format=zip --prefix="${REPO_NAME}-${VERSION}/" HEAD \
            -o "${REPO_NAME}-${VERSION}-source.zip"
          git archive --format=tar.gz --prefix="${REPO_NAME}-${VERSION}/" HEAD \
            -o "${REPO_NAME}-${VERSION}-source.tar.gz"

      - name: Create GitHub Release
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "🤖 Line Following Robot ${{ steps.get_version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            A_line_following_robot-${{ steps.get_version.outputs.VERSION }}-source.zip
            A_line_following_robot-${{ steps.get_version.outputs.VERSION }}-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
